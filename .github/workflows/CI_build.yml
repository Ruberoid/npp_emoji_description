name: CI_build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

jobs:
  build:

    # Pinned to windows-2022: the project targets the v143 toolset (VS2022), and
    # windows-latest has since moved to a newer VS that no longer ships v143.
    runs-on: windows-2022
    strategy:
      max-parallel: 6
      matrix:
        build_configuration: [Release, Debug]
        build_platform: [x64, Win32, ARM64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v7

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: MSBuild of plugin dll
      working-directory: vs.proj\
      run: msbuild EmojiDescription.vcxproj /m /p:configuration="${{ matrix.build_configuration }}" /p:platform="${{ matrix.build_platform }}"

    - name: Archive artifacts for x64
      if: matrix.build_platform == 'x64' && matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: plugin_dll_x64
          path: bin64\EmojiDescription.dll

    - name: Archive artifacts for Win32
      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: plugin_dll_x86
          path: bin\EmojiDescription.dll

    - name: Archive artifacts for ARM64
      if: matrix.build_platform == 'ARM64' && matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: plugin_dll_arm64
          path: arm64\EmojiDescription.dll
